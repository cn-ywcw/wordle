<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Wordle - 猜词游戏</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="container">
    <!-- 顶部标题栏 -->
    <header class="header">
      <h1 class="title">Wordle</h1>
      <div class="header-info">
        <span class="attempts" id="attempts">剩余尝试: 5</span>
        <button class="btn-restart" id="btnRestart" title="重新开始">&#x1F504;</button>
      </div>
    </header>

    <!-- 消息提示 -->
    <div class="message" id="message"></div>

    <!-- 猜词网格（JS 渲染） -->
    <div class="grid" id="grid"></div>

    <!-- 键盘（JS 渲染） -->
    <div class="keyboard" id="keyboard"></div>

    <!-- 游戏结束弹窗 -->
    <div class="modal-overlay" id="modalOverlay">
      <div class="modal" id="modal">
        <h2 class="modal-title" id="modalTitle"></h2>
        <p class="modal-answer" id="modalAnswer"></p>
        <button class="btn-restart modal-btn" id="modalRestart">再来一局</button>
      </div>
    </div>
  </div>

  <!-- 数据文件（全局变量） -->
  <script src="data/answers.js"></script>
  <script src="data/allowed.js"></script>
  <!-- 核心脚本 -->
  <script src="js/constants.js"></script>
  <script src="js/game.js"></script>
  <script src="js/ui.js"></script>
  <script src="js/main.js"></script>
</body>
</html>
